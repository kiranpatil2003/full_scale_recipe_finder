name: recipe_finder
description: "A full-scale Recipe Finder app with Firebase auth, Supabase backend, and multi-API recipe search."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  firebase_messaging: ^15.2.3
  google_sign_in: ^6.2.2
  http: ^1.3.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.4.1
  flutter_html: ^3.0.0-beta.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
